<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Elite Shooter - Moving Targets</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8fafc; overflow: hidden; touch-action: none; -webkit-user-select: none; margin: 0; position: fixed; width: 100%; height: 100%; }
        #stage { height: 100%; width: 100%; position: relative; background-image: radial-gradient(#e2e8f0 1.2px, transparent 1.2px); background-size: 30px 30px; }
        #ball { position: absolute; width: 42px; height: 42px; background: radial-gradient(circle at 30% 30%, #3b82f6, #1d4ed8); border: 3px solid #fff; border-radius: 50%; z-index: 1000; box-shadow: 0 8px 15px rgba(29, 78, 216, 0.3); }
        .bow-string { stroke: #334155; stroke-width: 5; fill: none; stroke-linecap: round; pointer-events: none; }
        #target-box { position: absolute; display: flex; flex-direction: column; gap: 4px; z-index: 100; will-change: transform; transition: transform 0.016s linear; }
        .score-zone { background: white; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.06); border-radius: 6px; }
        @media screen and (orientation: landscape) { #target-box { top: 25%; right: 28%; width: 160px; height: 50%; } .score-zone { flex: 1; font-size: 1.4rem; border-left: 6px solid; } }
        @media screen and (orientation: portrait) { #target-box { top: 20%; left: 80%; transform: translateX(-50%); width: 75px; height: 50%; } .score-zone { flex: 1; font-size: 0.9rem; border-left: 4px solid; } }
        #center-pop { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; font-weight: 900; font-size: 100px; z-index: 5000; opacity: 0; display: none; }
        .pop-animation { display: block !important; animation: scorePop 0.6s ease-out forwards; }
        @keyframes scorePop { 0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; } 40% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
    </style>
</head>
<body>

<header class="fixed top-0 w-full px-6 py-4 flex justify-between items-center z-[2000] bg-white/70 backdrop-blur-md border-b">
    <div class="font-black text-slate-300 text-[10px] tracking-widest uppercase">Target Elite</div>
    <div class="flex gap-4">
        <div class="text-right"><p class="text-[8px] text-slate-400">SHOTS</p><p id="v-shots" class="font-black text-xl">10</p></div>
        <div class="text-right"><p class="text-[8px] text-slate-400">SCORE</p><p id="v-score" class="font-black text-xl text-blue-600">0</p></div>
    </div>
</header>

<div id="stage">
    <div id="center-pop"></div>
    <div id="mask" class="absolute inset-0 z-[3000] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center">
        <button onclick="initGame()" class="px-14 py-4 bg-blue-600 text-white rounded-xl shadow-2xl font-black text-xl active:scale-95 transition-all">START</button>
    </div>
    <div id="target-box">
        <div class="score-zone border-rose-500 text-rose-600" data-pts="100">100</div>
        <div class="score-zone border-slate-600 text-slate-700" data-pts="-10">-10</div>
        <div class="score-zone border-amber-500 text-amber-600" data-pts="90">90</div>
        <div class="score-zone border-red-500 text-red-500" data-pts="-5">-5</div>
        <div class="score-zone border-emerald-500 text-emerald-600" data-pts="75">75</div>
        <div class="score-zone border-slate-300 text-slate-400" data-pts="0">0</div>
        <div class="score-zone border-blue-500 text-blue-600" data-pts="50">50</div>
    </div>
    <svg class="absolute inset-0 w-full h-full pointer-events-none">
        <path id="bow" stroke="#cbd5e1" stroke-width="8" fill="none" stroke-linecap="round" />
        <path id="s1" class="bow-string" />
        <path id="s2" class="bow-string" />
    </svg>
    <div id="ball"></div>
</div>

<script>
    const ball = document.getElementById('ball'), s1 = document.getElementById('s1'), s2 = document.getElementById('s2'), bow = document.getElementById('bow'), centerPop = document.getElementById('center-pop'), targetBox = document.getElementById('target-box');
    let score = 0, shots = 10, isFlying = false, active = false, oX, oY, isL = false;
    let targetY = 0, targetDir = 1;

    const resetLayout = () => {
        const w = window.innerWidth, h = window.innerHeight;
        isL = w > h;
        if (isL) {
            oX = w * 0.20; oY = h * 0.5 - 21;
            bow.setAttribute('d', `M ${w*0.12} ${h*0.3} Q ${w*0.22} ${h*0.5} ${w*0.12} ${h*0.7}`);
        } else {
            oX = w * 0.25 - 21; oY = h * 0.5; 
            bow.setAttribute('d', `M ${w*0.08} ${h*0.35} Q ${w*0.25} ${h*0.5} ${w*0.08} ${h*0.65}`);
        }
        if(!isFlying) {
            ball.style.left = oX + 'px'; ball.style.top = oY + 'px'; ball.style.transform = 'none';
            updateStrings(oX + 21, oY + 21);
        }
    };

    const updateStrings = (px, py) => {
        const w = window.innerWidth, h = window.innerHeight;
        if(isL) {
            s1.setAttribute('d', `M ${w*0.12} ${h*0.3} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.12} ${h*0.7} L ${px} ${py}`);
        } else {
            s1.setAttribute('d', `M ${w*0.08} ${h*0.35} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.08} ${h*0.65} L ${px} ${py}`);
        }
    };

    // 靶子上下移动的核心逻辑
    function moveTarget() {
        if (!active) return;
        const speed = 2; // 移动速度
        const range = 150; // 移动幅度
        targetY += speed * targetDir;
        if (Math.abs(targetY) > range) targetDir *= -1;
        
        // 电脑端和手机端不同的 Transform 处理
        if (isL) {
            targetBox.style.transform = `translateY(${targetY}px)`;
        } else {
            targetBox.style.transform = `translateX(-50%) translateY(${targetY}px)`;
        }
        requestAnimationFrame(moveTarget);
    }

    function triggerPop(pts) {
        centerPop.innerText = (pts >= 0 ? '+' : '') + pts;
        centerPop.style.color = pts > 0 ? '#3b82f6' : (pts < 0 ? '#ef4444' : '#64748b');
        centerPop.classList.remove('pop-animation');
        void centerPop.offsetWidth;
        centerPop.classList.add('pop-animation');
    }

    function initGame() {
        active = true; score = 0; shots = 10;
        document.getElementById('mask').style.display = 'none';
        document.getElementById('v-score').innerText = '0';
        document.getElementById('v-shots').innerText = '10';
        resetLayout();
        moveTarget(); // 游戏开始，启动靶子移动
    }

    let startX, startY, moveX = 0, moveY = 0, dragging = false;
    const getPos = (e) => (e.touches && e.touches[0]) || e;

    const onStart = (e) => {
        if(!active || isFlying) return;
        const p = getPos(e);
        const rect = ball.getBoundingClientRect();
        if (Math.hypot(p.clientX - (rect.left + 21), p.clientY - (rect.top + 21)) < 60) {
            dragging = true; startX = p.clientX; startY = p.clientY;
            ball.style.transition = 'none';
        }
    };

    const onMove = (e) => {
        if(!dragging) return;
        const p = getPos(e);
        const dx = p.clientX - startX, dy = p.clientY - startY;
        const dist = Math.hypot(dx, dy), limit = 100, ratio = Math.min(dist, limit) / (dist || 1);
        moveX = dx * ratio; moveY = dy * ratio;
        ball.style.transform = `translate(${moveX}px, ${moveY}px)`;
        updateStrings(oX + 21 + moveX, oY + 21 + moveY);
        if(e.cancelable) e.preventDefault();
    };

    const onEnd = () => {
        if(!dragging) return;
        // 防作弊：拉得太低无效
        if (moveY > 85) {
            dragging = false; moveX = 0; moveY = 0;
            ball.style.transition = 'all 0.3s';
            resetLayout(); return;
        }
        dragging = false; isFlying = true; shots--;
        document.getElementById('v-shots').innerText = shots;
        launch(-moveX * 0.22, -moveY * 0.22);
    };

    window.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    function launch(vx, vy) {
        let curX = oX, curY = oY;
        const step = () => {
            vy += 0.015; curX += vx; curY += vy;
            ball.style.left = curX + 'px'; ball.style.top = curY + 'px';
            ball.style.transform = 'none';
            const bR = ball.getBoundingClientRect();
            let hit = false;
            const targets = document.querySelectorAll('.score-zone');
            
            for(let z of targets) {
                const zR = z.getBoundingClientRect();
                // 实时检测碰撞，即便靶子在移动，getBoundingClientRect 拿到的也是实时位置
                if(bR.right > zR.left && bR.left < zR.right && bR.bottom > zR.top && bR.top < zR.bottom) {
                    // 正面击中判断
                    if (bR.left + 21 < zR.left + 15) {
                        const pts = parseInt(z.dataset.pts);
                        score += pts;
                        document.getElementById('v-score').innerText = score;
                        triggerPop(pts);
                        hit = true;
                        break; 
                    }
                }
            }

            if(hit || curX > window.innerWidth || curY > window.innerHeight || curX < -100 || curY < -100) {
                if(shots <= 0) { setTimeout(() => { alert('游戏结束！总分：' + score); location.reload(); }, 600); }
                else { isFlying = false; moveX = 0; moveY = 0; ball.style.transition = 'all 0.4s'; resetLayout(); }
            } else requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    window.addEventListener('resize', resetLayout);
    window.onload = resetLayout;
</script>
</body>
</html>
