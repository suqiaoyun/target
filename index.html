<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>TARGET ELITE - Mobile Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; overflow: hidden; touch-action: none; }
        
        /* 核心适配：容器在手机上保持比例并水平显示 */
        #game-container {
            touch-action: none;
            width: 100vw;
            height: 56.25vw; /* 保持 16:9 比例 */
            max-height: 80vh;
            position: relative;
        }

        #stage {
            background-image: radial-gradient(#dadce0 1px, transparent 1px);
            background-size: 30px 30px;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #projectile {
            background: radial-gradient(circle at 30% 30%, #669df6, var(--g-blue));
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-radius: 50%;
            z-index: 100;
            touch-action: none;
        }

        /* 移动端得分区调小一点防止堆叠 */
        .score-zone { height: 44px; font-size: 1.2rem; border-left-width: 6px; }
        .zone-100 { width: 100px; color: var(--g-red); border-color: var(--g-red); }
        .zone-90 { width: 130px; color: var(--g-yellow); border-color: var(--g-yellow); }
        .zone-75 { width: 160px; color: var(--g-green); border-color: var(--g-green); }
        .zone-50 { width: 190px; color: var(--g-blue); border-color: var(--g-blue); }

        /* 滚动分数在手机上调小 */
        .score-digit { height: 32px; font-size: 1.8rem; }
        #score-roller { height: 32px; }

        #overlay { background: rgba(255,255,255,0.9); backdrop-blur: 5px; }
        #big-start-btn { width: 160px; height: 160px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

<header class="fixed top-0 w-full bg-white px-6 py-3 border-b flex justify-between items-center shadow-sm">
    <span class="font-bold text-gray-800">Target Elite</span>
    <div class="flex items-center gap-4">
        <div class="text-center"><p class="text-[8px] uppercase text-gray-400">Shots</p><p id="shots-val" class="font-black">10</p></div>
        <div id="score-roller" class="flex gap-1"></div>
    </div>
</header>

<div id="game-container">
    <div id="stage" class="w-full h-full bg-white border-y border-gray-200 relative overflow-hidden flex items-center">
        
        <div id="overlay" class="absolute inset-0 z-[200] flex items-center justify-center">
            <div id="big-start-btn" onclick="startGame()" class="bg-[#4285F4] rounded-full border-8 border-white flex items-center justify-center shadow-xl cursor-pointer active:scale-90 transition-transform">
                <span class="text-white font-black text-2xl">START</span>
            </div>
            <div id="result-card" class="hidden bg-white p-8 rounded-3xl shadow-2xl text-center">
                <p class="text-gray-400 font-bold mb-1">FINAL SCORE</p>
                <h2 id="final-score" class="text-6xl font-black mb-6">0</h2>
                <button onclick="startGame()" class="bg-green-600 text-white px-8 py-3 rounded-full font-bold">AGAIN</button>
            </div>
        </div>

        <div class="w-1/2 h-full relative">
            <svg class="absolute inset-0 w-full h-full">
                <rect fill="#bdc1c6" x="140" y="40%" width="8" height="80" rx="4" />
                <path id="band-1" stroke="#202124" stroke-width="4" fill="none" d="M 100 30% Q 140 50% 140 50%" />
                <path id="band-2" stroke="#202124" stroke-width="4" fill="none" d="M 100 70% Q 140 50% 140 50%" />
            </svg>
            <div id="projectile" class="absolute w-10 h-10" style="left: 120px; top: calc(50% - 20px);"></div>
        </div>

        <div class="w-1/2 h-full flex flex-col items-end justify-center gap-2 pr-4">
            <div class="score-zone zone-100 bg-white border-l-8 flex items-center justify-center rounded-l-lg" data-pts="100"><b>100</b></div>
            <div class="score-zone zone-90 bg-white border-l-8 flex items-center justify-center rounded-l-lg" data-pts="90"><b>90</b></div>
            <div class="score-zone zone-75 bg-white border-l-8 flex items-center justify-center rounded-l-lg" data-pts="75"><b>75</b></div>
            <div class="score-zone zone-50 bg-white border-l-8 flex items-center justify-center rounded-l-lg" data-pts="50"><b>50</b></div>
        </div>
    </div>
</div>

<script>
    const projectile = document.getElementById('projectile');
    const stage = document.getElementById('stage');
    const overlay = document.getElementById('overlay');
    const roller = document.getElementById('score-roller');
    const shotsVal = document.getElementById('shots-val');
    const band1 = document.getElementById('band-1');
    const band2 = document.getElementById('band-2');

    let gameActive = false, score = 0, shots = 10, isFlying = false;
    let startX, startY, curX = 0, curY = 0;
    
    // 初始化原点位置（百分比适配）
    const getOrigin = () => ({ x: 120, y: stage.offsetHeight / 2 - 20 });

    // 初始化滚轮
    roller.innerHTML = '';
    for(let i=0; i<3; i++) {
        let d = document.createElement('div');
        d.id = `r-${i}`; d.className = 'transition-transform duration-300';
        for(let j=0; j<10; j++) d.innerHTML += `<div class="score-digit font-black text-blue-600">${j}</div>`;
        roller.appendChild(d);
    }

    function updateScore(s) {
        let str = s.toString().padStart(3, '0');
        for(let i=0; i<3; i++) document.getElementById(`r-${i}`).style.transform = `translateY(-${str[i]*32}px)`;
    }

    function startGame() {
        gameActive = true; score = 0; shots = 10;
        updateScore(0); shotsVal.innerText = '10';
        overlay.style.display = 'none';
        document.getElementById('result-card').classList.add('hidden');
        document.getElementById('big-start-btn').classList.remove('hidden');
        resetProjectile();
    }

    // 统一处理鼠标和触摸
    const handleStart = (e) => {
        if(!gameActive || isFlying) return;
        isFlying = false;
        const pos = e.touches ? e.touches[0] : e;
        startX = pos.clientX; startY = pos.clientY;
        projectile.style.transition = 'none';
    };

    const handleMove = (e) => {
        if(!startX) return;
        const pos = e.touches ? e.touches[0] : e;
        const dx = pos.clientX - startX, dy = pos.clientY - startY;
        const dist = Math.sqrt(dx*dx + dy*dy), limit = 150, r = Math.min(dist, limit) / (dist || 1);
        curX = dx * r; curY = dy * r;
        projectile.style.transform = `translate(${curX}px, ${curY}px)`;
        
        const origin = getOrigin();
        const px = origin.x + curX + 20, py = origin.y + curY + 20;
        band1.setAttribute('d', `M 100 ${stage.offsetHeight*0.3} Q ${px} ${py} ${px} ${py}`);
        band2.setAttribute('d', `M 100 ${stage.offsetHeight*0.7} Q ${px} ${py} ${px} ${py}`);
    };

    const handleEnd = () => {
        if(!startX) return;
        startX = null; isFlying = true; shots--;
        shotsVal.innerText = shots;
        launch(-curX * 12, -curY * 12);
        resetBands();
    };

    projectile.addEventListener('mousedown', handleStart);
    projectile.addEventListener('touchstart', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchend', handleEnd);

    function launch(vx, vy) {
        const origin = getOrigin();
        let x = origin.x + curX, y = origin.y + curY, v_x = vx, v_y = vy;
        const step = () => {
            v_y += 0.6; x += v_x * 0.016; y += v_y * 0.016;
            projectile.style.left = x + 'px'; projectile.style.top = y + 'px';
            projectile.style.transform = 'none';

            const pR = projectile.getBoundingClientRect();
            let hit = false;
            document.querySelectorAll('.score-zone').forEach(z => {
                const zR = z.getBoundingClientRect();
                if(pR.right > zR.left && pR.left < zR.right && pR.bottom > zR.top && pR.top < zR.bottom) {
                    score += parseInt(z.dataset.pts); updateScore(score); hit = true;
                }
            });

            if(hit || x > stage.offsetWidth || y > stage.offsetHeight || x < -50) {
                shots <= 0 ? endGame() : resetProjectile();
            } else requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    function resetProjectile() {
        const origin = getOrigin();
        isFlying = false; curX = 0; curY = 0;
        projectile.style.transition = 'all 0.5s cubic-bezier(0.19, 1, 0.22, 1)';
        projectile.style.left = origin.x + 'px'; projectile.style.top = origin.y + 'px';
        projectile.style.transform = 'none';
    }

    function resetBands() {
        band1.setAttribute('d', `M 100 30% Q 140 50% 140 50%`);
        band2.setAttribute('d', `M 100 70% Q 140 50% 140 50%`);
    }

    function endGame() {
        gameActive = false; overlay.style.display = 'flex';
        document.getElementById('big-start-btn').classList.add('hidden');
        document.getElementById('result-card').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }
</script>
</body>
</html>
