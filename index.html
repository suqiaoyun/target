<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Target Elite - 智能适配版</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        #stage { background-image: radial-gradient(#dadce0 1.2px, transparent 1.2px); background-size: 30px 30px; }
        .bow-string { stroke: #3c4043; stroke-width: 4; stroke-linecap: round; fill: none; }
        #projectile { background: radial-gradient(circle at 30% 30%, #669df6, var(--g-blue)); border: 2px solid #fff; box-shadow: 0 4px 10px rgba(66, 133, 244, 0.4); border-radius: 50%; z-index: 100; }
        
        /* 状态栏滚动数字 */
        #score-roller { height: 28px; overflow: hidden; display: flex; }
        .roller-digit-box { transition: transform 0.6s cubic-bezier(0.2, 0, 0, 1); display: flex; flex-direction: column; }
        .digit { height: 28px; line-height: 28px; font-weight: 900; font-size: 1.4rem; color: var(--g-blue); text-align: center; width: 16px; }

        /* --- 布局核心逻辑 --- */
        #game-layout { display: flex; width: 100%; height: 100%; }
        .target-container { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .shooter-area { position: relative; flex: 1; }

        /* 竖屏模式 (Portrait) */
        @media screen and (orientation: portrait) {
            #game-layout { flex-direction: column; }
            .target-container { flex-direction: column-reverse; height: 50%; padding-top: 40px; }
            .shooter-area { height: 50%; }
            .score-zone { height: 40px; width: 85%; }
            #guide-layer { top: 75%; }
        }

        /* 横屏模式 (Landscape) */
        @media screen and (orientation: landscape) {
            #game-layout { flex-direction: row; }
            .target-container { flex-direction: column; width: 40%; height: 100%; padding-right: 40px; align-items: flex-end; }
            .shooter-area { width: 60%; height: 100%; }
            .score-zone { height: 50px; width: 70%; border-bottom: 0; border-left: 8px solid; }
            #guide-layer { top: 50%; left: 30%; }
        }

        .score-zone { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        #guide-layer { position: absolute; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 150; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 0.5s; }
        @keyframes dragGuide { 0% { transform: translateY(0); opacity: 0; } 30% { opacity: 1; } 70% { transform: translateY(60px); opacity: 1; } 100% { transform: translateY(60px); opacity: 0; } }
        .hand-icon { font-size: 40px; animation: dragGuide 2s infinite; }
    </style>
</head>
<body class="flex flex-col h-screen w-screen">

<header class="w-full px-6 py-3 flex justify-between items-center z-50 bg-white/90 border-b">
    <div class="font-bold text-gray-500 text-sm">Target Elite</div>
    <div class="flex items-center gap-4">
        <div class="text-center"><p class="text-[8px] font-bold text-gray-400">SHOTS</p><p id="shots-val" class="text-xl font-black text-gray-700">10</p></div>
        <div class="text-right"><p class="text-[8px] font-bold text-gray-400">SCORE</p><div id="score-roller"></div></div>
    </div>
</header>

<main id="stage" class="flex-1 relative overflow-hidden">
    <div id="overlay" class="absolute inset-0 z-[200] bg-white/60 backdrop-blur-sm flex items-center justify-center">
        <button id="start-btn" onclick="startGame()" class="w-32 h-32 bg-[#4285F4] text-white rounded-full border-[6px] border-white shadow-2xl font-black text-xl active:scale-95 transition-transform">START</button>
        <div id="result-card" class="hidden bg-white p-8 rounded-3xl shadow-2xl text-center border mx-6">
            <p class="text-gray-400 font-bold mb-1 uppercase text-xs">Final Score</p>
            <h2 id="final-score" class="text-6xl font-black text-gray-900 mb-6">0</h2>
            <button onclick="startGame()" class="px-10 py-3 bg-green-600 text-white rounded-full font-bold shadow-lg">TRY AGAIN</button>
        </div>
    </div>

    <div id="guide-layer"><div class="hand-icon">👆</div><p class="text-[#4285F4] font-bold mt-2 text-xs bg-white/80 px-3 py-1 rounded-full shadow-sm">拖动射击</p></div>

    <div id="game-layout">
        <div class="target-container">
            <div class="score-zone border-[#4285F4] text-[#4285F4]" data-pts="50" style="border-bottom-width:6px">50</div>
            <div class="score-zone border-[#34A853] text-[#34A853]" data-pts="75" style="border-bottom-width:6px">75</div>
            <div class="score-zone border-[#FBBC05] text-[#FBBC05]" data-pts="90" style="border-bottom-width:6px">90</div>
            <div class="score-zone border-[#EA4335] text-[#EA4335]" data-pts="100" style="border-bottom-width:6px">100</div>
        </div>
        <div class="shooter-area">
            <svg id="bow-svg" class="absolute inset-0 w-full h-full pointer-events-none">
                <path id="bow-body" stroke="#dadce0" stroke-width="10" fill="none" stroke-linecap="round" />
                <path id="band-1" class="bow-string" />
                <path id="band-2" class="bow-string" />
            </svg>
            <div id="projectile" class="absolute w-12 h-12"></div>
        </div>
    </div>
</main>

<script>
    const projectile = document.getElementById('projectile'), roller = document.getElementById('score-roller'), b1 = document.getElementById('band-1'), b2 = document.getElementById('band-2'), bowBody = document.getElementById('bow-body'), stage = document.getElementById('stage'), guide = document.getElementById('guide-layer');
    let score = 0, shots = 10, isFlying = false, gameActive = false, oX, oY, isLandscape = false;

    const updateLayout = () => {
        isLandscape = window.innerWidth > window.innerHeight;
        const w = stage.offsetWidth, h = stage.offsetHeight;
        if (isLandscape) {
            oX = w * 0.2; oY = h / 2 - 24;
            bowBody.setAttribute('d', `M ${w*0.1} ${h*0.25} C ${w*0.2} ${h*0.4}, ${w*0.2} ${h*0.6}, ${w*0.1} ${h*0.75}`);
        } else {
            oX = w / 2 - 24; oY = h * 0.75 - 24;
            bowBody.setAttribute('d', `M ${w*0.15} ${h*0.75} C ${w*0.35} ${h*0.65}, ${w*0.65} ${h*0.65}, ${w*0.85} ${h*0.75}`);
        }
        if(!isFlying) { projectile.style.left = oX + 'px'; projectile.style.top = oY + 'px'; resetBands(); }
    };

    function initRoller() {
        roller.innerHTML = '';
        for(let i=0; i<4; i++) {
            const box = document.createElement('div'); box.id = `rb-${i}`; box.className = 'roller-digit-box';
            for(let j=0; j<10; j++) box.innerHTML += `<div class="digit">${j}</div>`;
            roller.appendChild(box);
        }
    }
    initRoller();

    function updateScore(ns) {
        score = ns; const s = score.toString().padStart(4, '0');
        for(let i=0; i<4; i++) document.getElementById(`rb-${i}`).style.transform = `translateY(-${s[i]*28}px)`;
    }

    function startGame() {
        gameActive = true; score = 0; shots = 10; updateScore(0); updateLayout();
        document.getElementById('shots-val').innerText = '10';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('result-card').classList.add('hidden');
        guide.style.opacity = '1';
        resetProjectile();
    }

    let sX, sY, cX = 0, cY = 0, dragging = false;
    const start = (e) => {
        if(!gameActive || isFlying) return;
        dragging = true; guide.style.opacity = '0';
        const p = e.touches ? e.touches[0] : e;
        sX = p.clientX; sY = p.clientY;
        projectile.style.transition = 'none';
    };

    const move = (e) => {
        if(!dragging) return;
        const p = e.touches ? e.touches[0] : e;
        const dx = p.clientX - sX, dy = p.clientY - sY;
        const d = Math.sqrt(dx*dx + dy*dy), lim = 120, r = Math.min(d, lim) / (d || 1);
        cX = dx * r; cY = dy * r;
        projectile.style.transform = `translate(${cX}px, ${cY}px)`;
        const px = oX + cX + 24, py = oY + cY + 24;
        if(isLandscape) {
            b1.setAttribute('d', `M ${stage.offsetWidth*0.1} ${stage.offsetHeight*0.25} Q ${px} ${py} ${px} ${py}`);
            b2.setAttribute('d', `M ${stage.offsetWidth*0.1} ${stage.offsetHeight*0.75} Q ${px} ${py} ${px} ${py}`);
        } else {
            b1.setAttribute('d', `M ${stage.offsetWidth*0.15} ${stage.offsetHeight*0.75} Q ${px} ${py} ${px} ${py}`);
            b2.setAttribute('d', `M ${stage.offsetWidth*0.85} ${stage.offsetHeight*0.75} Q ${px} ${py} ${px} ${py}`);
        }
        if(e.cancelable) e.preventDefault();
    };

    const end = () => {
        if(!dragging) return;
        dragging = false; isFlying = true; shots--;
        document.getElementById('shots-val').innerText = shots;
        launch(-cX * 10, -cY * 12); resetBands();
    };

    projectile.addEventListener('touchstart', start, {passive: false});
    window.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('touchend', end);
    window.addEventListener('resize', updateLayout);

    function launch(vx, vy) {
        let x = oX, y = oY, vX = vx * 0.016, vY = vy * 0.016;
        const anim = () => {
            vY += 0.4 * 0.016; x += vX; y += vY;
            projectile.style.left = x + 'px'; projectile.style.top = y + 'px';
            projectile.style.transform = 'none';
            const pR = projectile.getBoundingClientRect();
            let hit = false;
            document.querySelectorAll('.score-zone').forEach(z => {
                const zR = z.getBoundingClientRect();
                if(pR.right > zR.left && pR.left < zR.right && pR.bottom > zR.top && pR.top < zR.bottom) {
                    updateScore(score + parseInt(z.dataset.pts)); hit = true;
                }
            });
            if(hit || x > window.innerWidth || y > window.innerHeight || y < 0 || x < -50) {
                shots <= 0 ? setTimeout(endGame, 500) : resetProjectile();
            } else requestAnimationFrame(anim);
        };
        requestAnimationFrame(anim);
    }

    function resetProjectile() { isFlying = false; cX = 0; cY = 0; projectile.style.transition = 'all 0.4s ease-out'; projectile.style.left = oX + 'px'; projectile.style.top = oY + 'px'; projectile.style.transform = 'none'; }
    function resetBands() {
        const w = stage.offsetWidth, h = stage.offsetHeight;
        if(isLandscape) {
            b1.setAttribute('d', `M ${w*0.1} ${h*0.25} Q ${oX+24} ${oY+24} ${oX+24} ${oY+24}`);
            b2.setAttribute('d', `M ${w*0.1} ${h*0.75} Q ${oX+24} ${oY+24} ${oX+24} ${oY+24}`);
        } else {
            b1.setAttribute('d', `M ${w*0.15} ${h*0.75} Q ${oX+24} ${oY+24} ${oX+24} ${oY+24}`);
            b2.setAttribute('d', `M ${w*0.85} ${h*0.75} Q ${oX+24} ${oY+24} ${oX+24} ${oY+24}`);
        }
    }
    function endGame() { gameActive = false; document.getElementById('overlay').style.display = 'flex'; document.getElementById('start-btn').classList.add('hidden'); document.getElementById('result-card').classList.remove('hidden'); document.getElementById('final-score').innerText = score; }
    
    window.onload = updateLayout;
</script>
</body>
</html>
