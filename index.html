<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Target Elite Portrait</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        
        /* 竖屏背景网格 */
        #stage { background-image: radial-gradient(#dadce0 1.2px, transparent 1.2px); background-size: 30px 30px; }
        
        .bow-string { stroke: #3c4043; stroke-width: 4; stroke-linecap: round; fill: none; }
        
        #projectile {
            background: radial-gradient(circle at 30% 30%, #669df6, var(--g-blue));
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(66, 133, 244, 0.4);
            border-radius: 50%;
            z-index: 100;
        }

        /* 状态栏：竖屏下更窄 */
        .status-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-blur: 10px;
            border-bottom: 1px solid #dadce0;
        }

        /* 竖屏滚轮计分 */
        #score-roller { height: 28px; overflow: hidden; display: flex; }
        .roller-digit-box { transition: transform 0.6s cubic-bezier(0.2, 0, 0, 1); display: flex; flex-direction: column; }
        .digit { height: 28px; line-height: 28px; font-weight: 900; font-size: 1.4rem; color: var(--g-blue); text-align: center; width: 16px; }

        /* 目标区域竖屏排列 */
        .target-container {
            display: flex;
            flex-direction: column-reverse; /* 100分在最远端 */
            align-items: center;
            gap: 8px;
            width: 100%;
            padding-top: 20px;
        }
        .score-zone {
            height: 40px;
            border-bottom: 6px solid transparent;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }
    </style>
</head>
<body class="flex flex-col h-screen w-screen">

<header class="status-bar w-full px-6 py-3 flex justify-between items-center z-50">
    <div class="font-bold text-gray-600 text-sm">Target Elite</div>
    <div class="flex items-center gap-4">
        <div class="flex flex-col items-center">
            <span class="text-[8px] font-bold text-gray-400">SHOTS</span>
            <span id="shots-val" class="text-xl font-black text-gray-700">10</span>
        </div>
        <div class="h-8 w-[1px] bg-gray-200"></div>
        <div class="flex flex-col items-end">
            <span class="text-[8px] font-bold text-gray-400">SCORE</span>
            <div id="score-roller"></div>
        </div>
    </div>
</header>

<main id="stage" class="flex-1 relative overflow-hidden flex flex-col">
    <div id="overlay" class="absolute inset-0 z-[200] bg-white/60 backdrop-blur-sm flex items-center justify-center">
        <button id="start-btn" onclick="startGame()" class="w-32 h-32 bg-[#4285F4] text-white rounded-full border-[6px] border-white shadow-2xl font-black text-xl active:scale-90 transition-transform">START</button>
        <div id="result-card" class="hidden bg-white p-8 rounded-3xl shadow-2xl text-center border mx-6">
            <p class="text-gray-400 font-bold mb-1">FINAL SCORE</p>
            <h2 id="final-score" class="text-6xl font-black text-gray-900 mb-6">0</h2>
            <button onclick="startGame()" class="w-full py-3 bg-green-600 text-white rounded-full font-bold shadow-lg">TRY AGAIN</button>
        </div>
    </div>

    <div class="h-1/2 w-full target-container">
        <div class="score-zone w-3/4 border-[#4285F4] text-[#4285F4]" data-pts="50">50</div>
        <div class="score-zone w-2/3 border-[#34A853] text-[#34A853]" data-pts="75">75</div>
        <div class="score-zone w-1/2 border-[#FBBC05] text-[#FBBC05]" data-pts="90">90</div>
        <div class="score-zone w-1/3 border-[#EA4335] text-[#EA4335]" data-pts="100">100</div>
    </div>

    <div class="h-1/2 w-full relative">
        <svg class="absolute inset-0 w-full h-full pointer-events-none">
            <path d="M 20% 80% C 40% 70%, 60% 70%, 80% 80%" stroke="#dadce0" stroke-width="10" fill="none" stroke-linecap="round" />
            <path id="band-1" class="bow-string" d="M 20% 80% Q 50% 80% 50% 80%" />
            <path id="band-2" class="bow-string" d="M 80% 80% Q 50% 80% 50% 80%" />
        </svg>
        <div id="projectile" class="absolute w-12 h-12" style="left: calc(50% - 24px); top: 75%;"></div>
    </div>
</main>

<script>
    const projectile = document.getElementById('projectile');
    const roller = document.getElementById('score-roller');
    const b1 = document.getElementById('band-1');
    const b2 = document.getElementById('band-2');
    const stage = document.getElementById('stage');
    
    let score = 0, shots = 10, isFlying = false, gameActive = false;
    let oX, oY;

    const updatePos = () => {
        oX = stage.offsetWidth / 2 - 24;
        oY = stage.offsetHeight * 0.75;
        if(!isFlying) { projectile.style.left = oX + 'px'; projectile.style.top = oY + 'px'; }
    };

    function initRoller() {
        roller.innerHTML = '';
        for(let i=0; i<4; i++) {
            const box = document.createElement('div');
            box.id = `rb-${i}`; box.className = 'roller-digit-box';
            for(let j=0; j<10; j++) box.innerHTML += `<div class="digit">${j}</div>`;
            roller.appendChild(box);
        }
    }
    initRoller();

    function updateScore(ns) {
        score = ns; const s = score.toString().padStart(4, '0');
        for(let i=0; i<4; i++) document.getElementById(`rb-${i}`).style.transform = `translateY(-${s[i]*28}px)`;
    }

    function startGame() {
        gameActive = true; score = 0; shots = 10;
        updateScore(0); updatePos();
        document.getElementById('shots-val').innerText = '10';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('start-btn').classList.remove('hidden');
        document.getElementById('result-card').classList.add('hidden');
        resetProjectile();
    }

    let sX, sY, cX = 0, cY = 0, dragging = false;

    const start = (e) => {
        if(!gameActive || isFlying) return;
        dragging = true;
        const p = e.touches ? e.touches[0] : e;
        sX = p.clientX; sY = p.clientY;
        projectile.style.transition = 'none';
    };

    const move = (e) => {
        if(!dragging) return;
        const p = e.touches ? e.touches[0] : e;
        const dx = p.clientX - sX, dy = p.clientY - sY;
        const d = Math.sqrt(dx*dx + dy*dy), lim = 120, r = Math.min(d, lim) / (d || 1);
        cX = dx * r; cY = dy * r;
        projectile.style.transform = `translate(${cX}px, ${cY}px)`;
        
        const px = oX + cX + 24, py = oY + cY + 24;
        b1.setAttribute('d', `M ${stage.offsetWidth*0.2} ${stage.offsetHeight*0.8 + stage.offsetHeight*0.135} Q ${px} ${py} ${px} ${py}`);
        b2.setAttribute('d', `M ${stage.offsetWidth*0.8} ${stage.offsetHeight*0.8 + stage.offsetHeight*0.135} Q ${px} ${py} ${px} ${py}`);
        if(e.cancelable) e.preventDefault();
    };

    const end = () => {
        if(!dragging) return;
        dragging = false; isFlying = true; shots--;
        document.getElementById('shots-val').innerText = shots;
        launch(-cX * 10, -cY * 12);
        resetBands();
    };

    projectile.addEventListener('mousedown', start);
    projectile.addEventListener('touchstart', start, {passive: false});
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('mouseup', end);
    window.addEventListener('touchend', end);
    window.addEventListener('resize', updatePos);

    function launch(vx, vy) {
        let x = oX, y = oY, vX = vx * 0.016, vY = vy * 0.016;
        const anim = () => {
            vY += 0.4 * 0.016; x += vX; y += vY;
            projectile.style.left = x + 'px'; projectile.style.top = y + 'px';
            const pR = projectile.getBoundingClientRect();
            let hit = false;
            document.querySelectorAll('.score-zone').forEach(z => {
                const zR = z.getBoundingClientRect();
                if(pR.right > zR.left && pR.left < zR.right && pR.bottom > zR.top && pR.top < zR.bottom) {
                    updateScore(score + parseInt(z.dataset.pts)); hit = true;
                }
            });
            if(hit || x > window.innerWidth || y > window.innerHeight || y < 0 || x < -50) {
                shots <= 0 ? setTimeout(endGame, 500) : resetProjectile();
            } else requestAnimationFrame(anim);
        };
        requestAnimationFrame(anim);
    }

    function resetProjectile() {
        isFlying = false; cX = 0; cY = 0;
        projectile.style.transition = 'all 0.4s ease-out';
        projectile.style.left = oX + 'px'; projectile.style.top = oY + 'px';
        projectile.style.transform = 'none';
    }

    function resetBands() {
        b1.setAttribute('d', `M 20% 80% Q 50% 80% 50% 80%`);
        b2.setAttribute('d', `M 80% 80% Q 50% 80% 50% 80%`);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('start-btn').classList.add('hidden');
        document.getElementById('result-card').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }
    
    window.onload = updatePos;
</script>
</body>
</html>
