<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Target Elite - 最终修正版</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853; }
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; overflow: hidden; touch-action: none; -webkit-user-select: none; margin: 0; }
        #stage { background-image: radial-gradient(#dadce0 1.2px, transparent 1.2px); background-size: 30px 30px; height: 100vh; width: 100vw; position: relative; }
        .bow-string { stroke: #3c4043; stroke-width: 4; stroke-linecap: round; fill: none; }
        #projectile { background: radial-gradient(circle at 30% 30%, #669df6, var(--g-blue)); border: 2px solid #fff; box-shadow: 0 4px 10px rgba(66, 133, 244, 0.4); border-radius: 50%; z-index: 100; position: absolute; width: 48px; height: 48px; display: block !important; }
        
        /* 状态栏数字 */
        #score-roller { height: 28px; overflow: hidden; display: flex; }
        .roller-digit-box { transition: transform 0.6s cubic-bezier(0.2, 0, 0, 1); display: flex; flex-direction: column; }
        .digit { height: 28px; line-height: 28px; font-weight: 900; font-size: 1.4rem; color: var(--g-blue); text-align: center; width: 16px; }

        /* 布局容器 */
        #game-content { display: flex; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .target-area { display: flex; justify-content: center; align-items: center; z-index: 10; }
        .score-zone { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        /* 📱 竖屏样式 */
        @media screen and (orientation: portrait) {
            #game-content { flex-direction: column; }
            .target-area { height: 45%; flex-direction: column-reverse; gap: 10px; padding-top: 60px; }
            .score-zone { width: 80%; height: 40px; border-bottom: 6px solid; }
        }

        /* 💻 横屏样式 */
        @media screen and (orientation: landscape) {
            #game-content { flex-direction: row; }
            .target-area { width: 40%; height: 100%; flex-direction: column; gap: 12px; align-items: flex-end; padding-right: 40px; order: 2; }
            .score-zone { width: 70%; height: 50px; border-left: 8px solid; border-bottom: 0; }
        }

        #guide { position: absolute; pointer-events: none; z-index: 150; text-align: center; width: 100%; opacity: 0; transition: opacity 0.5s; }
        @keyframes finger { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(50px); } }
        .hand { font-size: 40px; animation: finger 2s infinite; }
    </style>
</head>
<body>

<header class="fixed top-0 w-full px-6 py-3 flex justify-between items-center z-[250] bg-white/90 border-b">
    <div class="font-bold text-gray-500 text-sm">Target Elite</div>
    <div class="flex items-center gap-4">
        <div class="text-center"><p class="text-[8px] font-bold text-gray-400">SHOTS</p><p id="shots-val" class="text-xl font-black text-gray-700">10</p></div>
        <div class="text-right"><p class="text-[8px] font-bold text-gray-400">SCORE</p><div id="score-roller"></div></div>
    </div>
</header>

<div id="stage">
    <div id="overlay" class="absolute inset-0 z-[300] bg-white/60 backdrop-blur-sm flex items-center justify-center">
        <button id="start-btn" onclick="startGame()" class="w-32 h-32 bg-[#4285F4] text-white rounded-full border-[6px] border-white shadow-2xl font-black text-xl active:scale-95 transition-all">START</button>
        <div id="result-card" class="hidden bg-white p-8 rounded-3xl shadow-2xl text-center border">
            <h2 id="final-score" class="text-6xl font-black text-gray-900 mb-6">0</h2>
            <button onclick="startGame()" class="px-10 py-3 bg-green-600 text-white rounded-full font-bold">RETRY</button>
        </div>
    </div>

    <div id="guide"><div class="hand">👆</div><p class="text-[#4285F4] font-bold text-xs mt-2">拖动射击</p></div>

    <div id="game-content">
        <div class="target-area">
            <div class="score-zone border-[#4285F4] text-[#4285F4]" data-pts="50">50</div>
            <div class="score-zone border-[#34A853] text-[#34A853]" data-pts="75">75</div>
            <div class="score-zone border-[#FBBC05] text-[#FBBC05]" data-pts="90">90</div>
            <div class="score-zone border-[#EA4335] text-[#EA4335]" data-pts="100">100</div>
        </div>
        <div class="flex-1 relative">
            <svg id="svg-layer" class="absolute inset-0 w-full h-full pointer-events-none">
                <path id="bow-line" stroke="#dadce0" stroke-width="8" fill="none" stroke-linecap="round" />
                <path id="b1" class="bow-string" />
                <path id="b2" class="bow-string" />
            </svg>
            <div id="projectile"></div>
        </div>
    </div>
</div>

<script>
    const ball = document.getElementById('projectile'), b1 = document.getElementById('b1'), b2 = document.getElementById('b2'), bow = document.getElementById('bow-line'), roller = document.getElementById('score-roller'), guide = document.getElementById('guide');
    let score = 0, shots = 10, isFlying = false, active = false, oX, oY, landscape = false;

    const layout = () => {
        landscape = window.innerWidth > window.innerHeight;
        const w = window.innerWidth, h = window.innerHeight;
        if (landscape) {
            oX = w * 0.15; oY = h / 2 - 24;
            bow.setAttribute('d', `M ${w*0.08} ${h*0.3} Q ${w*0.15} ${h*0.5} ${w*0.08} ${h*0.7}`);
            guide.style.top = (oY - 60) + 'px'; guide.style.left = '0';
        } else {
            oX = w / 2 - 24; oY = h * 0.75;
            bow.setAttribute('d', `M ${w*0.2} ${h*0.8} Q ${w*0.5} ${h*0.7} ${w*0.8} ${h*0.8}`);
            guide.style.top = (oY - 100) + 'px'; guide.style.left = '0';
        }
        if(!isFlying) { ball.style.left = oX + 'px'; ball.style.top = oY + 'px'; resetBands(); }
    };

    function initRoller() {
        roller.innerHTML = '';
        for(let i=0; i<4; i++) {
            const div = document.createElement('div'); div.id = `rb-${i}`; div.className = 'roller-digit-box';
            for(let j=0; j<10; j++) div.innerHTML += `<div class="digit">${j}</div>`;
            roller.appendChild(div);
        }
    }
    initRoller();

    function updateScore(n) {
        score = n; const s = score.toString().padStart(4, '0');
        for(let i=0; i<4; i++) document.getElementById(`rb-${i}`).style.transform = `translateY(-${s[i]*28}px)`;
    }

    function startGame() {
        active = true; score = 0; shots = 10; updateScore(0); layout();
        document.getElementById('shots-val').innerText = '10';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('result-card').classList.add('hidden');
        guide.style.opacity = '1';
        isFlying = false;
    }

    let sX, sY, cX = 0, cY = 0, dragging = false;
    const dragStart = (e) => {
        if(!active || isFlying) return;
        dragging = true; guide.style.opacity = '0';
        const p = e.touches ? e.touches[0] : e;
        sX = p.clientX; sY = p.clientY;
        ball.style.transition = 'none';
    };

    const dragMove = (e) => {
        if(!dragging) return;
        const p = e.touches ? e.touches[0] : e;
        const dx = p.clientX - sX, dy = p.clientY - sY;
        const d = Math.sqrt(dx*dx + dy*dy), lim = 100, r = Math.min(d, lim) / (d || 1);
        cX = dx * r; cY = dy * r;
        ball.style.transform = `translate(${cX}px, ${cY}px)`;
        const px = oX + cX + 24, py = oY + cY + 24;
        const w = window.innerWidth, h = window.innerHeight;
        if(landscape) {
            b1.setAttribute('d', `M ${w*0.08} ${h*0.3} L ${px} ${py}`);
            b2.setAttribute('d', `M ${w*0.08} ${h*0.7} L ${px} ${py}`);
        } else {
            b1.setAttribute('d', `M ${w*0.2} ${h*0.8} L ${px} ${py}`);
            b2.setAttribute('d', `M ${w*0.8} ${h*0.8} L ${px} ${py}`);
        }
        if(e.cancelable) e.preventDefault();
    };

    const dragEnd = () => {
        if(!dragging) return;
        dragging = false; isFlying = true; shots--;
        document.getElementById('shots-val').innerText = shots;
        launchBall(-cX * 10, -cY * 10); resetBands();
    };

    ball.addEventListener('touchstart', dragStart, {passive: false});
    window.addEventListener('touchmove', dragMove, {passive: false});
    window.addEventListener('touchend', dragEnd);
    window.addEventListener('resize', layout);

    function launchBall(vx, vy) {
        let x = oX, y = oY, vX = vx * 0.016, vY = vy * 0.016;
        const step = () => {
            vY += 0.4 * 0.016; x += vX; y += vY;
            ball.style.left = x + 'px'; ball.style.top = y + 'px';
            ball.style.transform = 'none';
            const rect = ball.getBoundingClientRect();
            let hit = false;
            document.querySelectorAll('.score-zone').forEach(z => {
                const zR = z.getBoundingClientRect();
                if(rect.right > zR.left && rect.left < zR.right && rect.bottom > zR.top && rect.top < zR.bottom) {
                    updateScore(score + parseInt(z.dataset.pts)); hit = true;
                }
            });
            if(hit || x > window.innerWidth || y > window.innerHeight || y < 0 || x < -50) {
                shots <= 0 ? setTimeout(endGame, 500) : resetBall();
            } else requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    function resetBall() { isFlying = false; cX = 0; cY = 0; ball.style.transition = 'all 0.3s ease-out'; ball.style.left = oX + 'px'; ball.style.top = oY + 'px'; ball.style.transform = 'none'; }
    function resetBands() {
        const w = window.innerWidth, h = window.innerHeight, px = oX + 24, py = oY + 24;
        if(landscape) {
            b1.setAttribute('d', `M ${w*0.08} ${h*0.3} L ${px} ${py}`);
            b2.setAttribute('d', `M ${w*0.08} ${h*0.7} L ${px} ${py}`);
        } else {
            b1.setAttribute('d', `M ${w*0.2} ${h*0.8} L ${px} ${py}`);
            b2.setAttribute('d', `M ${w*0.8} ${h*0.8} L ${px} ${py}`);
        }
    }
    function endGame() { active = false; document.getElementById('overlay').style.display = 'flex'; document.getElementById('start-btn').classList.add('hidden'); document.getElementById('result-card').classList.remove('hidden'); document.getElementById('final-score').innerText = score; }
    
    window.onload = layout;
</script>
</body>
</html>
