<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Target Elite - Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; overflow: hidden; touch-action: none; -webkit-user-select: none; margin: 0; position: fixed; width: 100%; height: 100%; }
        #stage { height: 100%; width: 100%; position: relative; background-image: radial-gradient(#dadce0 1.2px, transparent 1.2px); background-size: 30px 30px; }
        #ball { 
            position: absolute; width: 54px; height: 54px; 
            background: radial-gradient(circle at 30% 30%, #669df6, #4285F4);
            border: 3px solid #fff; border-radius: 50%; z-index: 1000;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.5);
            touch-action: none;
        }
        .bow-string { stroke: #3c4043; stroke-width: 4; fill: none; pointer-events: none; }
        .score-zone { background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        @media screen and (orientation: portrait) {
            #target-box { height: 40%; width: 100%; flex-direction: column-reverse; padding-top: 80px; }
            .score-zone { width: 85%; height: 45px; border-bottom: 6px solid; }
        }
        @media screen and (orientation: landscape) {
            #target-box { width: 45%; height: 100%; flex-direction: column; align-items: flex-end; padding-right: 40px; right: 0; position: absolute; justify-content: center; }
            .score-zone { width: 75%; height: 50px; border-left: 8px solid; margin-bottom: 12px; }
        }
    </style>
</head>
<body>

<header class="fixed top-0 w-full px-6 py-3 flex justify-between items-center z-[2000] bg-white/90 border-b">
    <div class="font-bold text-gray-400 text-xs">TARGET ELITE</div>
    <div class="flex gap-4">
        <div class="text-right"><p id="v-shots" class="font-black text-xl text-gray-700">10</p></div>
        <div class="text-right"><p id="v-score" class="font-black text-xl text-[#4285F4]">0000</p></div>
    </div>
</header>

<div id="stage">
    <div id="mask" class="absolute inset-0 z-[3000] bg-white/80 backdrop-blur-md flex items-center justify-center">
        <button onclick="initGame()" class="px-12 py-6 bg-[#4285F4] text-white rounded-full shadow-2xl font-black text-2xl active:scale-90 transition-all">PLAY NOW</button>
    </div>

    <div id="target-box" class="flex items-center">
        <div class="score-zone border-[#4285F4] text-[#4285F4]" data-pts="50">50</div>
        <div class="score-zone border-[#34A853] text-[#34A853]" data-pts="75">75</div>
        <div class="score-zone border-[#FBBC05] text-[#FBBC05]" data-pts="90">90</div>
        <div class="score-zone border-[#EA4335] text-[#EA4335]" data-pts="100">100</div>
    </div>

    <svg class="absolute inset-0 w-full h-full pointer-events-none">
        <path id="bow" stroke="#dadce0" stroke-width="8" fill="none" stroke-linecap="round" />
        <path id="s1" class="bow-string" />
        <path id="s2" class="bow-string" />
    </svg>

    <div id="ball"></div>
</div>

<script>
    const ball = document.getElementById('ball'), s1 = document.getElementById('s1'), s2 = document.getElementById('s2'), bow = document.getElementById('bow');
    let score = 0, shots = 10, isFlying = false, active = false, oX, oY, isL = false;

    const resetLayout = () => {
        const w = window.innerWidth, h = window.innerHeight;
        isL = w > h;
        if (isL) {
            oX = w * 0.18; oY = h * 0.5 - 27;
            bow.setAttribute('d', `M ${w*0.1} ${h*0.3} Q ${w*0.2} ${h*0.5} ${w*0.1} ${h*0.7}`);
        } else {
            oX = w * 0.5 - 27; oY = h * 0.78;
            bow.setAttribute('d', `M ${w*0.15} ${h*0.82} Q ${w*0.5} ${h*0.72} ${w*0.85} ${h*0.82}`);
        }
        if(!isFlying) {
            ball.style.left = oX + 'px';
            ball.style.top = oY + 'px';
            ball.style.transform = 'none';
            updateStrings(oX + 27, oY + 27);
        }
    };

    const updateStrings = (px, py) => {
        const w = window.innerWidth, h = window.innerHeight;
        if(isL) {
            s1.setAttribute('d', `M ${w*0.1} ${h*0.3} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.1} ${h*0.7} L ${px} ${py}`);
        } else {
            s1.setAttribute('d', `M ${w*0.15} ${h*0.82} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.85} ${h*0.82} L ${px} ${py}`);
        }
    };

    function initGame() {
        active = true; score = 0; shots = 10;
        document.getElementById('mask').style.display = 'none';
        document.getElementById('v-score').innerText = '0000';
        document.getElementById('v-shots').innerText = '10';
        resetLayout();
    }

    let startX, startY, moveX = 0, moveY = 0, dragging = false;

    const getPos = (e) => (e.touches && e.touches[0]) || e;

    const onStart = (e) => {
        if(!active || isFlying) return;
        const p = getPos(e);
        const rect = ball.getBoundingClientRect();
        // 扩大判定范围，只要点在小球附近 60px 内都能触发
        if (Math.hypot(p.clientX - (rect.left + 27), p.clientY - (rect.top + 27)) < 60) {
            dragging = true;
            startX = p.clientX; startY = p.clientY;
            ball.style.transition = 'none';
            if(e.cancelable) e.preventDefault();
        }
    };

    const onMove = (e) => {
        if(!dragging) return;
        const p = getPos(e);
        const dx = p.clientX - startX, dy = p.clientY - startY;
        const dist = Math.hypot(dx, dy), limit = 110, ratio = Math.min(dist, limit) / (dist || 1);
        moveX = dx * ratio; moveY = dy * ratio;
        ball.style.transform = `translate(${moveX}px, ${moveY}px)`;
        updateStrings(oX + 27 + moveX, oY + 27 + moveY);
        if(e.cancelable) e.preventDefault();
    };

    const onEnd = () => {
        if(!dragging) return;
        dragging = false; isFlying = true; shots--;
        document.getElementById('v-shots').innerText = shots;
        launch(-moveX * 0.16, -moveY * 0.16);
    };

    // 全局监听，彻底解决拖动丢失问题
    window.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    function launch(vx, vy) {
        let curX = oX, curY = oY;
        const step = () => {
            vy += 0.009; curX += vx; curY += vy;
            ball.style.left = curX + 'px'; ball.style.top = curY + 'px';
            ball.style.transform = 'none';
            const bR = ball.getBoundingClientRect();
            let hit = false;
            document.querySelectorAll('.score-zone').forEach(z => {
                const zR = z.getBoundingClientRect();
                if(bR.right > zR.left && bR.left < zR.right && bR.bottom > zR.top && bR.top < zR.bottom) {
                    score += parseInt(z.dataset.pts);
                    document.getElementById('v-score').innerText = score.toString().padStart(4, '0');
                    hit = true;
                }
            });
            if(hit || curX > window.innerWidth || curY > window.innerHeight || curX < -100 || curY < -100) {
                if(shots <= 0) { alert('Final Score: ' + score); location.reload(); }
                else { isFlying = false; moveX = 0; moveY = 0; ball.style.transition = 'all 0.4s'; resetLayout(); }
            } else requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    window.addEventListener('resize', resetLayout);
    window.onload = resetLayout;
</script>
</body>
</html>
