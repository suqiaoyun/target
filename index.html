<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Target Elite - Ultra Smooth</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; overflow: hidden; touch-action: none; -webkit-user-select: none; margin: 0; position: fixed; width: 100%; height: 100%; }
        #stage { height: 100%; width: 100%; position: relative; background-image: radial-gradient(#d1d5db 1.5px, transparent 1.5px); background-size: 40px 40px; }
        
        #ball { 
            position: absolute; width: 56px; height: 56px; 
            background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb);
            border: 4px solid #fff; border-radius: 50%; z-index: 1000;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            cursor: grab; transition: transform 0.1s ease-out, box-shadow 0.2s;
        }
        #ball:active { cursor: grabbing; box-shadow: 0 5px 10px rgba(37, 99, 235, 0.5); }

        .bow-string { stroke: #1e293b; stroke-width: 5; fill: none; stroke-linecap: round; pointer-events: none; }
        .score-zone { 
            background: white; border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.2s;
        }
        .hit-flash { transform: scale(1.05); filter: brightness(1.2); }
        
        @media screen and (orientation: portrait) {
            #target-box { height: 45%; width: 100%; flex-direction: column-reverse; padding-top: 100px; gap: 15px; }
            .score-zone { width: 85%; height: 50px; border-bottom: 8px solid; font-size: 1.25rem; }
        }
        @media screen and (orientation: landscape) {
            #target-box { width: 40%; height: 100%; flex-direction: column; align-items: flex-end; padding-right: 50px; right: 0; position: absolute; justify-content: center; gap: 15px; }
            .score-zone { width: 80%; height: 60px; border-left: 10px solid; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header class="fixed top-0 w-full px-8 py-4 flex justify-between items-center z-[2000] bg-white/70 backdrop-blur-md border-b border-gray-200">
    <div class="tracking-widest font-black text-gray-400 text-xs">TARGET ELITE</div>
    <div class="flex gap-6">
        <div class="flex flex-col items-end"><span class="text-[10px] text-gray-400">SHOTS</span><span id="v-shots" class="font-black text-2xl text-gray-800">10</span></div>
        <div class="flex flex-col items-end"><span class="text-[10px] text-gray-400">SCORE</span><span id="v-score" class="font-black text-2xl text-blue-600">0000</span></div>
    </div>
</header>

<div id="stage">
    <div id="mask" class="absolute inset-0 z-[3000] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center">
        <div class="text-center bg-white p-10 rounded-3xl shadow-2xl">
            <h1 class="text-3xl font-black mb-6 text-slate-800">Ready to Aim?</h1>
            <button onclick="initGame()" class="px-12 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl shadow-xl font-bold text-xl transform active:scale-95 transition-all">START GAME</button>
        </div>
    </div>

    <div id="target-box" class="flex px-4">
        <div class="score-zone border-blue-500 text-blue-600" data-pts="50">50</div>
        <div class="score-zone border-emerald-500 text-emerald-600" data-pts="75">75</div>
        <div class="score-zone border-amber-500 text-amber-600" data-pts="90">90</div>
        <div class="score-zone border-rose-500 text-rose-600" data-pts="100">100</div>
    </div>

    <svg class="absolute inset-0 w-full h-full pointer-events-none">
        <path id="bow" stroke="#cbd5e1" stroke-width="12" fill="none" stroke-linecap="round" />
        <path id="s1" class="bow-string" />
        <path id="s2" class="bow-string" />
    </svg>

    <div id="ball"></div>
</div>

<script>
    const ball = document.getElementById('ball'), s1 = document.getElementById('s1'), s2 = document.getElementById('s2'), bow = document.getElementById('bow');
    let score = 0, shots = 10, isFlying = false, active = false, oX, oY, isL = false;

    const resetLayout = () => {
        const w = window.innerWidth, h = window.innerHeight;
        isL = w > h;
        if (isL) {
            oX = w * 0.2; oY = h * 0.5 - 28;
            bow.setAttribute('d', `M ${w*0.12} ${h*0.25} Q ${w*0.25} ${h*0.5} ${w*0.12} ${h*0.75}`);
        } else {
            oX = w * 0.5 - 28; oY = h * 0.75;
            bow.setAttribute('d', `M ${w*0.1} ${h*0.8} Q ${w*0.5} ${h*0.65} ${w*0.9} ${h*0.8}`);
        }
        if(!isFlying) {
            ball.style.left = oX + 'px';
            ball.style.top = oY + 'px';
            ball.style.transform = 'scale(1)';
            updateStrings(oX + 28, oY + 28);
        }
    };

    const updateStrings = (px, py) => {
        const w = window.innerWidth, h = window.innerHeight;
        if(isL) {
            s1.setAttribute('d', `M ${w*0.12} ${h*0.25} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.12} ${h*0.75} L ${px} ${py}`);
        } else {
            s1.setAttribute('d', `M ${w*0.1} ${h*0.8} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.9} ${h*0.8} L ${px} ${py}`);
        }
    };

    function initGame() {
        active = true; score = 0; shots = 10;
        document.getElementById('mask').style.display = 'none';
        document.getElementById('v-score').innerText = '0000';
        document.getElementById('v-shots').innerText = '10';
        resetLayout();
    }

    let startX, startY, moveX = 0, moveY = 0, dragging = false;

    const onStart = (e) => {
        if(!active || isFlying) return;
        const p = (e.touches && e.touches[0]) || e;
        const rect = ball.getBoundingClientRect();
        const dist = Math.hypot(p.clientX - (rect.left + 28), p.clientY - (rect.top + 28));
        if (dist < 70) {
            dragging = true;
            startX = p.clientX; startY = p.clientY;
            ball.style.transition = 'none';
        }
    };

    const onMove = (e) => {
        if(!dragging) return;
        const p = (e.touches && e.touches[0]) || e;
        const dx = p.clientX - startX, dy = p.clientY - startY;
        
        // 增加胡克定律模拟：拉动阻力
        const rawDist = Math.hypot(dx, dy);
        const limit = 120;
        const easedDist = limit * Math.atan(rawDist / limit); // 使用 Atan 函数模拟拉力上限
        const angle = Math.atan2(dy, dx);
        
        moveX = Math.cos(angle) * easedDist;
        moveY = Math.sin(angle) * easedDist;
        
        ball.style.transform = `translate(${moveX}px, ${moveY}px) scale(0.95)`;
        updateStrings(oX + 28 + moveX, oY + 28 + moveY);
        if(e.cancelable) e.preventDefault();
    };

    const onEnd = () => {
        if(!dragging) return;
        dragging = false; isFlying = true; shots--;
        document.getElementById('v-shots').innerText = shots;
        // 稍微提升了力度系数，让射击感更爽快
        launchBall(-moveX * 0.18, -moveY * 0.18);
    };

    window.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    function launchBall(vx, vy) {
        let curX = oX, curY = oY;
        const step = () => {
            vy += 0.01; // 重力稍大一点，轨迹更真实
            curX += vx; curY += vy;
            ball.style.left = curX + 'px'; ball.style.top = curY + 'px';
            ball.style.transform = 'scale(1)';
            
            const bR = ball.getBoundingClientRect();
            let hit = false;
            document.querySelectorAll('.score-zone').forEach(z => {
                const zR = z.getBoundingClientRect();
                if(bR.right > zR.left && bR.left < zR.right && bR.bottom > zR.top && bR.top < zR.bottom) {
                    score += parseInt(z.dataset.pts);
                    document.getElementById('v-score').innerText = score.toString().padStart(4, '0');
                    z.classList.add('hit-flash');
                    setTimeout(() => z.classList.remove('hit-flash'), 200);
                    hit = true;
                }
            });

            if(hit || curX > window.innerWidth || curY > window.innerHeight || curX < -100 || curY < -100) {
                if(shots <= 0) {
                    setTimeout(() => { alert('Total Score: ' + score); location.reload(); }, 300);
                } else {
                    isFlying = false; moveX = 0; moveY = 0;
                    ball.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; // 回弹动画
                    resetLayout();
                }
            } else requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    window.addEventListener('resize', resetLayout);
    window.onload = resetLayout;
</script>
</body>
</html>
