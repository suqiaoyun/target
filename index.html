<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Target Elite - Universal Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --g-blue: #4285F4; }
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; overflow: hidden; touch-action: none; -webkit-user-select: none; margin: 0; }
        #stage { height: 100vh; width: 100vw; position: relative; background-image: radial-gradient(#dadce0 1.2px, transparent 1.2px); background-size: 30px 30px; }
        
        #ball { 
            position: absolute; width: 50px; height: 50px; 
            background: radial-gradient(circle at 30% 30%, #669df6, var(--g-blue));
            border: 2px solid #fff; border-radius: 50%; z-index: 1000;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.5);
            cursor: grab;
        }
        #ball:active { cursor: grabbing; }

        .bow-string { stroke: #3c4043; stroke-width: 4; fill: none; pointer-events: none; }
        .score-zone { background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        @media screen and (orientation: portrait) {
            #target-box { height: 40%; width: 100%; flex-direction: column-reverse; padding-top: 60px; }
            .score-zone { width: 80%; height: 45px; border-bottom: 6px solid; }
        }
        @media screen and (orientation: landscape) {
            #target-box { width: 40%; height: 100%; flex-direction: column; align-items: flex-end; padding-right: 40px; right: 0; position: absolute; justify-content: center; }
            .score-zone { width: 75%; height: 50px; border-left: 8px solid; margin-bottom: 12px; }
        }
    </style>
</head>
<body>

<header class="fixed top-0 w-full px-6 py-3 flex justify-between items-center z-[2000] bg-white/80 border-b">
    <div class="font-bold text-gray-500">Target Elite</div>
    <div class="flex gap-4">
        <div class="text-right text-xs"><p class="text-gray-400">SHOTS</p><p id="v-shots" class="font-black text-lg">10</p></div>
        <div class="text-right text-xs"><p class="text-gray-400">SCORE</p><p id="v-score" class="font-black text-lg text-[#4285F4]">0000</p></div>
    </div>
</header>

<div id="stage">
    <div id="mask" class="absolute inset-0 z-[3000] bg-white/60 backdrop-blur-md flex items-center justify-center">
        <button onclick="initGame()" class="w-32 h-32 bg-[#4285F4] text-white rounded-full border-8 border-white shadow-2xl font-black text-2xl active:scale-95 transition-transform">START</button>
    </div>

    <div id="target-box" class="flex">
        <div class="score-zone border-[#4285F4] text-[#4285F4]" data-pts="50">50</div>
        <div class="score-zone border-[#34A853] text-[#34A853]" data-pts="75">75</div>
        <div class="score-zone border-[#FBBC05] text-[#FBBC05]" data-pts="90">90</div>
        <div class="score-zone border-[#EA4335] text-[#EA4335]" data-pts="100">100</div>
    </div>

    <svg class="absolute inset-0 w-full h-full pointer-events-none">
        <path id="bow" stroke="#dadce0" stroke-width="8" fill="none" stroke-linecap="round" />
        <path id="s1" class="bow-string" />
        <path id="s2" class="bow-string" />
    </svg>

    <div id="ball"></div>
</div>

<script>
    const ball = document.getElementById('ball'), s1 = document.getElementById('s1'), s2 = document.getElementById('s2'), bow = document.getElementById('bow');
    let score = 0, shots = 10, isFlying = false, active = false, oX, oY, isL = false;

    const resetLayout = () => {
        const w = window.innerWidth, h = window.innerHeight;
        isL = w > h;
        if (isL) {
            oX = w * 0.2; oY = h * 0.5 - 25;
            bow.setAttribute('d', `M ${w*0.12} ${h*0.3} Q ${w*0.22} ${h*0.5} ${w*0.12} ${h*0.7}`);
        } else {
            oX = w * 0.5 - 25; oY = h * 0.75;
            bow.setAttribute('d', `M ${w*0.2} ${h*0.8} Q ${w*0.5} ${h*0.7} ${w*0.8} ${h*0.8}`);
        }
        if(!isFlying) {
            ball.style.left = oX + 'px';
            ball.style.top = oY + 'px';
            updateStrings(oX + 25, oY + 25);
        }
    };

    const updateStrings = (px, py) => {
        const w = window.innerWidth, h = window.innerHeight;
        if(isL) {
            s1.setAttribute('d', `M ${w*0.12} ${h*0.3} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.12} ${h*0.7} L ${px} ${py}`);
        } else {
            s1.setAttribute('d', `M ${w*0.2} ${h*0.8} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.8} ${h*0.8} L ${px} ${py}`);
        }
    };

    function initGame() {
        active = true; score = 0; shots = 10;
        document.getElementById('mask').style.display = 'none';
        document.getElementById('v-score').innerText = '0000';
        document.getElementById('v-shots').innerText = '10';
        resetLayout();
    }

    let startX, startY, moveX = 0, moveY = 0, dragging = false;

    // 同时适配鼠标和触摸
    const onStart = (e) => {
        if(!active || isFlying) return;
        dragging = true;
        const p = (e.touches && e.touches[0]) || e;
        startX = p.clientX; startY = p.clientY;
        ball.style.transition = 'none';
    };

    const onMove = (e) => {
        if(!dragging) return;
        const p = (e.touches && e.touches[0]) || e;
        const dx = p.clientX - startX, dy = p.clientY - startY;
        const dist = Math.sqrt(dx*dx + dy*dy), limit = 100, ratio = Math.min(dist, limit) / (dist || 1);
        moveX = dx * ratio; moveY = dy * ratio;
        ball.style.transform = `translate(${moveX}px, ${moveY}px)`;
        updateStrings(oX + 25 + moveX, oY + 25 + moveY);
        if(e.cancelable) e.preventDefault();
    };

    const onEnd = () => {
        if(!dragging) return;
        dragging = false; isFlying = true; shots--;
        document.getElementById('v-shots').innerText = shots;
        launch(-moveX * 0.15, -moveY * 0.15);
        updateStrings(oX + 25, oY + 25);
    };

    // 绑定鼠标事件
    ball.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);

    // 绑定触摸事件
    ball.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    function launch(vx, vy) {
        let curX = oX, curY = oY;
        const step = () => {
            vy += 0.008; curX += vx; curY += vy;
            ball.style.left = curX + 'px'; ball.style.top = curY + 'px';
            ball.style.transform = 'none';
            
            const bR = ball.getBoundingClientRect();
            let hit = false;
            document.querySelectorAll('.score-zone').forEach(z => {
                const zR = z.getBoundingClientRect();
                if(bR.right > zR.left && bR.left < zR.right && bR.bottom > zR.top && bR.top < zR.bottom) {
                    score += parseInt(z.dataset.pts);
                    document.getElementById('v-score').innerText = score.toString().padStart(4, '0');
                    hit = true;
                }
            });

            if(hit || curX > window.innerWidth || curY > window.innerHeight || curX < -100 || curY < -100) {
                if(shots <= 0) {
                    alert('游戏结束！总分：' + score);
                    location.reload();
                } else {
                    isFlying = false; moveX = 0; moveY = 0;
                    ball.style.transition = 'all 0.3s';
                    resetLayout();
                }
            } else requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    window.addEventListener('resize', resetLayout);
    window.onload = resetLayout;
</script>
</body>
</html>
