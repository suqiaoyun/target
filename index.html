<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Target Elite - Pro Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; overflow: hidden; touch-action: none; -webkit-user-select: none; margin: 0; position: fixed; width: 100%; height: 100%; }
        #stage { height: 100%; width: 100%; position: relative; background-image: radial-gradient(#d1d5db 1.5px, transparent 1.5px); background-size: 40px 40px; }
        
        #ball { 
            position: absolute; width: 50px; height: 50px; 
            background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb);
            border: 3px solid #fff; border-radius: 50%; z-index: 1000;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            cursor: grab;
        }

        .bow-string { stroke: #1e293b; stroke-width: 5; fill: none; stroke-linecap: round; pointer-events: none; }
        
        /* 靶子基础样式 */
        .score-zone { 
            background: white; border-radius: 8px; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: transform 0.1s; position: relative;
        }

        /* 分数飘浮动画 */
        .pop-score {
            position: absolute; pointer-events: none; font-weight: 900; font-size: 24px;
            animation: floatUp 0.8s ease-out forwards; z-index: 2000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; scale: 0.5; }
            100% { transform: translateY(-60px); opacity: 0; scale: 1.5; }
        }

        @media screen and (orientation: portrait) {
            #target-box { height: 55%; width: 100%; flex-direction: column-reverse; padding-top: 80px; gap: 8px; }
            .score-zone { width: 85%; height: 38px; border-bottom: 6px solid; font-size: 1.1rem; }
        }
        @media screen and (orientation: landscape) {
            #target-box { width: 45%; height: 100%; flex-direction: column; align-items: flex-end; padding-right: 40px; right: 0; position: absolute; justify-content: center; gap: 10px; }
            .score-zone { width: 75%; height: 45px; border-left: 8px solid; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<header class="fixed top-0 w-full px-6 py-3 flex justify-between items-center z-[2000] bg-white/80 border-b">
    <div class="font-black text-gray-400 text-xs">TARGET ELITE</div>
    <div class="flex gap-4">
        <div class="text-right"><p class="text-[8px] text-gray-400">SHOTS</p><p id="v-shots" class="font-black text-xl text-gray-800">10</p></div>
        <div class="text-right"><p class="text-[8px] text-gray-400">SCORE</p><p id="v-score" class="font-black text-xl text-blue-600">0000</p></div>
    </div>
</header>

<div id="stage">
    <div id="mask" class="absolute inset-0 z-[3000] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center">
        <button onclick="initGame()" class="px-12 py-5 bg-blue-600 text-white rounded-2xl shadow-xl font-black text-xl active:scale-95 transition-all">START</button>
    </div>

    <div id="target-box" class="flex px-4">
        <div class="score-zone border-blue-500 text-blue-500" data-pts="50">50</div>
        <div class="score-zone border-gray-400 text-gray-400" data-pts="0">0</div>
        <div class="score-zone border-emerald-500 text-emerald-500" data-pts="75">75</div>
        <div class="score-zone border-red-400 text-red-500" data-pts="-5">-5</div>
        <div class="score-zone border-amber-500 text-amber-500" data-pts="90">90</div>
        <div class="score-zone border-red-600 text-red-700" data-pts="-10">-10</div>
        <div class="score-zone border-rose-500 text-rose-600" data-pts="100">100</div>
    </div>

    <svg class="absolute inset-0 w-full h-full pointer-events-none">
        <path id="bow" stroke="#cbd5e1" stroke-width="10" fill="none" stroke-linecap="round" />
        <path id="s1" class="bow-string" />
        <path id="s2" class="bow-string" />
    </svg>

    <div id="ball"></div>
</div>

<script>
    const ball = document.getElementById('ball'), s1 = document.getElementById('s1'), s2 = document.getElementById('s2'), bow = document.getElementById('bow'), stage = document.getElementById('stage');
    let score = 0, shots = 10, isFlying = false, active = false, oX, oY, isL = false;

    const resetLayout = () => {
        const w = window.innerWidth, h = window.innerHeight;
        isL = w > h;
        if (isL) {
            oX = w * 0.18; oY = h * 0.5 - 25;
            bow.setAttribute('d', `M ${w*0.1} ${h*0.3} Q ${w*0.2} ${h*0.5} ${w*0.1} ${h*0.7}`);
        } else {
            oX = w * 0.5 - 25; oY = h * 0.8;
            bow.setAttribute('d', `M ${w*0.15} ${h*0.85} Q ${w*0.5} ${h*0.75} ${w*0.85} ${h*0.85}`);
        }
        if(!isFlying) {
            ball.style.left = oX + 'px';
            ball.style.top = oY + 'px';
            ball.style.transform = 'none';
            updateStrings(oX + 25, oY + 25);
        }
    };

    const updateStrings = (px, py) => {
        const w = window.innerWidth, h = window.innerHeight;
        if(isL) {
            s1.setAttribute('d', `M ${w*0.1} ${h*0.3} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.1} ${h*0.7} L ${px} ${py}`);
        } else {
            s1.setAttribute('d', `M ${w*0.15} ${h*0.85} L ${px} ${py}`);
            s2.setAttribute('d', `M ${w*0.85} ${h*0.85} L ${px} ${py}`);
        }
    };

    function showPopScore(val, x, y) {
        const pop = document.createElement('div');
        pop.className = 'pop-score';
        pop.innerText = (val >= 0 ? '+' : '') + val;
        pop.style.left = x + 'px';
        pop.style.top = y + 'px';
        pop.style.color = val > 0 ? '#2563eb' : '#ef4444';
        stage.appendChild(pop);
        setTimeout(() => pop.remove(), 800);
    }

    function initGame() {
        active = true; score = 0; shots = 10;
        document.getElementById('mask').style.display = 'none';
        document.getElementById('v-score').innerText = '0000';
        document.getElementById('v-shots').innerText = '10';
        resetLayout();
    }

    let startX, startY, moveX = 0, moveY = 0, dragging = false;
    const getPos = (e) => (e.touches && e.touches[0]) || e;

    const onStart = (e) => {
        if(!active || isFlying) return;
        const p = getPos(e);
        const rect = ball.getBoundingClientRect();
        if (Math.hypot(p.clientX - (rect.left + 25), p.clientY - (rect.top + 25)) < 60) {
            dragging = true; startX = p.clientX; startY = p.clientY;
            ball.style.transition = 'none';
        }
    };

    const onMove = (e) => {
        if(!dragging) return;
        const p = getPos(e);
        const dx = p.clientX - startX, dy = p.clientY - startY;
        const dist = Math.hypot(dx, dy), limit = 110, ratio = Math.min(dist, limit) / (dist || 1);
        moveX = dx * ratio; moveY = dy * ratio;
        ball.style.transform = `translate(${moveX}px, ${moveY}px)`;
        updateStrings(oX + 25 + moveX, oY + 25 + moveY);
        if(e.cancelable) e.preventDefault();
    };

    const onEnd = () => {
        if(!dragging) return;
        dragging = false; isFlying = true; shots--;
        document.getElementById('v-shots').innerText = shots;
        launch(-moveX * 0.17, -moveY * 0.17);
    };

    window.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    function launch(vx, vy) {
        let curX = oX, curY = oY;
        const step = () => {
            vy += 0.009; curX += vx; curY += vy;
            ball.style.left = curX + 'px'; ball.style.top = curY + 'px';
            ball.style.transform = 'none';
            const bR = ball.getBoundingClientRect();
            let hit = false;
            document.querySelectorAll('.score-zone').forEach(z => {
                const zR = z.getBoundingClientRect();
                if(bR.right > zR.left && bR.left < zR.right && bR.bottom > zR.top && bR.top < zR.bottom) {
                    const pts = parseInt(z.dataset.pts);
                    score += pts;
                    document.getElementById('v-score').innerText = score.toString().padStart(4, '0');
                    showPopScore(pts, bR.left, bR.top);
                    hit = true;
                }
            });

            if(hit || curX > window.innerWidth || curY > window.innerHeight || curX < -100 || curY < -100) {
                if(shots <= 0) { setTimeout(() => { alert('Game Over! Score: ' + score); location.reload(); }, 500); }
                else { isFlying = false; moveX = 0; moveY = 0; ball.style.transition = 'all 0.4s'; resetLayout(); }
            } else requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    window.addEventListener('resize', resetLayout);
    window.onload = resetLayout;
</script>
</body>
</html>
